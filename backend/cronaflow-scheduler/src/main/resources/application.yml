server:
  port: 8080

spring:
  application:
    name: cronaflow-scheduler
  config:
    import: optional:file:backend/cronaflow-scheduler/.env[.properties], optional:file:.env[.properties]

  # MongoDB Configuration
  mongodb:
    uri: mongodb://localhost:27017/cronaflow
    database: cronaflow

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

gemini:
  api-key: ${GEMINI_API_KEY}

jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForCronaFlowDashboard2026!}